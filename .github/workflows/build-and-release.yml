name: Build and Release Electron App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump version and push tag
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Incrementa la versione patch (es. 1.0.0 -> 1.0.1)
          npm version patch -m "chore: bump version to %s [skip ci]"
          
          # Estrae la nuova versione per passarla ai job successivi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Pusha il commit del bump e il relativo tag
          git push origin HEAD:${{ github.ref_name }} --follow-tags

  release:
    needs: bump-version
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository (at the new tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Publish to GitHub Releases
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
